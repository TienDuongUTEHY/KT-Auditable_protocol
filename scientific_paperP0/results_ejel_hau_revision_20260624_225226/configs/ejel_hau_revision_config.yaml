project: lc_mrsg_ejel_hau_revision
random_seeds: [42, 2024, 2025]
folds: [0, 1, 2]
datasets: [assist2012, junyi, kdd2010]
models: [bkt, dkt, simplekt, gikt, skt]

paths:
  data_root: data/processed
  graph_root: graphs
  prediction_root: results/predictions
  log_root: results/logs

kdd2010_eco_sensitivity:
  k_min_grid: [2, 3, 5, 10, 20, 50, 100]
  pmi_min_grid: [0.0, 0.25, 0.5, 1.0]
  topk_per_skill_grid: [null, 100, 50, 20, 10]

training:
  max_epochs: 100
  patience: 10
  min_delta: 0.0001
  monitor: valid_auc

strata:
  very_sparse_max: 50
  sparse_max: 100
  medium_max: 200
  frequent_max: 500
